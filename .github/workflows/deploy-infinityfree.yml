name: Deploy to InfinityFree

on:
  # Automatic deployment whenever production files are pushed to main.
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'styles.css'
      - 'script.js'
      - 'data/printful-products.json'
      - 'assets/**'
      - 'scripts/deploy_infinityfree.php'
      - 'scripts/sync_printful_products.php'
      - '.github/workflows/deploy-infinityfree.yml'
  # Manual trigger for urgent fixes or first-time validation.
  workflow_dispatch:

# Prevent overlapping deployments that can race and partially overwrite files.
concurrency:
  group: infinityfree-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Required so environment-scoped variables/secrets (e.g., boomtrack) are available in this job.
    environment:
      name: boomtrack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dry-run deployment plan
        env:
          # Support repository/organization variables and lowercase names.
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || secrets.ftp_target_dir || vars.FTP_TARGET_DIR || vars.ftp_target_dir }}
        run: |
          php scripts/deploy_infinityfree.php --dry-run



      - name: Sync Printful catalog (optional)
        env:
          PRINTFUL_API_KEY: ${{ secrets.PRINTFUL_API_KEY || secrets.printful_api_key || vars.PRINTFUL_API_KEY || vars.printful_api_key }}
        run: |
          if [[ -n "$PRINTFUL_API_KEY" ]]; then
            php scripts/sync_printful_products.php
          else
            echo "PRINTFUL_API_KEY missing; skipping catalog sync and deploying existing data/printful-products.json"
          fi

      - name: Validate FTP variables are available
        env:
          FTP_HOST: ${{ secrets.FTP_HOST || secrets.ftp_host || vars.FTP_HOST || vars.ftp_host }}
          FTP_USER: ${{ secrets.FTP_USER || secrets.ftp_user || vars.FTP_USER || vars.ftp_user }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.ftp_password || vars.FTP_PASSWORD || vars.ftp_password }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || secrets.ftp_target_dir || vars.FTP_TARGET_DIR || vars.ftp_target_dir }}
        run: |
          # Print only variable presence, never secret values.
          [[ -n "$FTP_HOST" ]] && echo "FTP_HOST is set" || echo "FTP_HOST is missing (will default to ftpupload.net)"
          [[ -n "$FTP_TARGET_DIR" ]] && echo "FTP_TARGET_DIR is set" || echo "FTP_TARGET_DIR is missing (will default to htdocs)"
          [[ -n "$FTP_USER" ]] && echo "FTP_USER is set" || { echo "FTP_USER is missing"; exit 1; }
          [[ -n "$FTP_PASSWORD" ]] && echo "FTP_PASSWORD is set" || { echo "FTP_PASSWORD is missing"; exit 1; }

      - name: Deploy via FTP
        env:
          # Keep credentials in GitHub secrets only.
          # Read from uppercase/lowercase secret names; allow vars for non-sensitive fields.
          FTP_HOST: ${{ secrets.FTP_HOST || secrets.ftp_host || vars.FTP_HOST || vars.ftp_host }}
          FTP_USER: ${{ secrets.FTP_USER || secrets.ftp_user || vars.FTP_USER || vars.ftp_user }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.ftp_password || vars.FTP_PASSWORD || vars.ftp_password }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || secrets.ftp_target_dir || vars.FTP_TARGET_DIR || vars.ftp_target_dir }}
        run: |
          php scripts/deploy_infinityfree.php
